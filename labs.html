<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labs — TP & Labs IT</title>
  <meta name="description" content="Tous les labs IT : réseau, systèmes, sécurité, virtualisation, DevOps...">
  <meta name="theme-color" content="#0F0E0C">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="nav" role="navigation" aria-label="Navigation principale">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="TP & Labs IT — Accueil">
        <svg class="logo-bolt" width="28" height="28" viewBox="0 0 512 512" aria-hidden="true">
          <path d="M256 98 L393 177 L393 335 L256 414 L119 335 L119 177 Z" fill="none" stroke="currentColor" stroke-width="30" stroke-linejoin="round"/>
          <path d="M278 146 L179 278 L245 278 L234 366 L333 234 L267 234 Z" fill="currentColor"/>
        </svg>
        <span class="logo-text">TP<span class="logo-amp">&</span>Labs<span class="logo-it">IT</span></span>
      </a>
      <ul class="nav-links" role="list">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="labs.html" class="active" aria-current="page">Labs</a></li>
        <li><a href="index.html#progression">Progression</a></li>
      </ul>
      <div class="nav-search">
        <span class="nav-search-icon" aria-hidden="true">🔍</span>
        <input type="search" placeholder="Rechercher…  Ctrl+K" aria-label="Recherche globale" readonly>
      </div>
      <div class="nav-actions">
        <button class="nav-search-btn" id="btn-mobile-search" aria-label="Ouvrir la recherche">🔍</button>
        <label style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:7px 12px;cursor:pointer;font-size:0.82rem;color:var(--text-secondary);display:flex;align-items:center;gap:6px;transition:all 0.2s" title="Importer des labs JSON">
          ↑ Import
          <input type="file" id="import-input" accept=".json" style="display:none" aria-label="Importer des labs JSON">
        </label>
        <button id="btn-export" style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text-secondary);cursor:pointer;font-size:0.82rem;transition:all 0.2s" title="Exporter ma progression" aria-label="Exporter ma progression">
          ↓ Export
        </button>
        <button class="btn-theme" aria-label="Basculer le thème">☀️</button>
        <button class="btn-burger" id="btn-burger" aria-label="Ouvrir le menu" aria-expanded="false">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M4 7h16M4 12h16M4 17h16"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ── Layout principal ── -->
  <div class="labs-layout">

    <!-- Sidebar filtres -->
    <aside class="sidebar" id="sidebar" role="complementary" aria-label="Filtres">

      <div class="sidebar-section">
        <div class="sidebar-title">Catégories</div>
        <div class="cat-filter-list"></div>
      </div>

      <div class="sidebar-section">
        <label class="fav-toggle-row">
          <input type="checkbox" id="fav-toggle" aria-label="Afficher uniquement les favoris">
          <span>⭐ Favoris uniquement</span>
        </label>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Statut</div>
        <select class="filter-select" id="statut-select" aria-label="Filtrer par statut">
          <option value="">Tous les statuts</option>
          <option value="afaire">⬜ À faire</option>
          <option value="encours">◐ En cours</option>
          <option value="termine">✓ Terminé</option>
        </select>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Niveau</div>
        <select class="filter-select" id="niveau-select" aria-label="Filtrer par niveau">
          <option value="">Tous les niveaux</option>
          <option value="débutant">🟢 Débutant</option>
          <option value="intermédiaire">🟡 Intermédiaire</option>
          <option value="avancé">🔴 Avancé</option>
        </select>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Source</div>
        <select class="filter-select" id="source-select" aria-label="Filtrer par source">
          <option value="">Toutes les sources</option>
          <option value="École">🏫 École</option>
          <option value="Personnel">👤 Personnel</option>
        </select>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Tags populaires</div>
        <div class="tag-filter-list" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>

    </aside>

    <!-- Main content -->
    <main class="labs-main" role="main">

      <div class="labs-toolbar">
        <div class="labs-count" id="labs-count" aria-live="polite">
          <strong>0</strong> labs trouvés
        </div>
        <select class="sort-select" id="sort-select" aria-label="Trier les labs">
          <option value="default">Tri par défaut</option>
          <option value="alpha">Alphabétique</option>
          <option value="niveau">Par niveau</option>
          <option value="duree">Par durée</option>
          <option value="progression">Par progression</option>
        </select>
      </div>

      <div class="labs-grid" id="labs-grid" role="list" aria-label="Liste des labs"></div>

    </main>

  </div>

  <!-- ── Panel Détail ── -->
  <div class="detail-overlay" id="detail-overlay" aria-hidden="true"></div>
  <div class="detail-panel" id="detail-panel" role="dialog" aria-modal="true" aria-label="Détail du lab">
    <!-- Rempli dynamiquement par script.js -->
  </div>

  <!-- ── FAB mobile filtres ── -->
  <button class="fab-filter" id="fab-filter" aria-label="Ouvrir les filtres">
    ⚙️
  </button>

  <!-- ── Search Overlay ── -->
  <div class="search-overlay" id="search-overlay" role="dialog" aria-modal="true" aria-label="Recherche">
    <div class="search-box">
      <div class="search-input-row">
        <span aria-hidden="true">🔍</span>
        <input type="search" id="search-input-overlay" placeholder="Rechercher un lab, une commande, un tag..." aria-label="Recherche de labs">
        <button onclick="closeSearch()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.8rem;padding:4px 8px" aria-label="Fermer la recherche">ESC</button>
      </div>
      <div class="search-results" id="search-results" role="listbox">
        <div class="search-empty">Tape un mot-clé pour rechercher un lab...</div>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>

  <script src="data/data-automatisation.js" defer></script>
  <script src="data/data-projets.js" defer></script>
  <script src="data/data-reseau.js" defer></script>
  <script src="data/data-sauvegardes.js" defer></script>
  <script src="data/data-securite.js" defer></script>
  <script src="data/data-slam.js" defer></script>
  <script src="data/data-supervision.js" defer></script>
  <script src="data/data-systemes.js" defer></script>
  <script src="data/data-virtualisation.js" defer></script>
  <script src="data/data-index.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
